spring:
  application:
    name: gestionar-series


  datasource:
    url: jdbc:postgresql://localhost:5432/management_series
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver



  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect


  flyway:
    enabled: true
    locations: classpath:db/migration